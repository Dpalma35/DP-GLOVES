
<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Promoções - DP Gloves</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f4f4;
color:#111;
}

/* HEADER */

header{
background:#fff;
padding:20px 60px;
display:flex;
align-items:center;
justify-content:space-between;
height:160px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img:first-child{
height:120px;
}

.logo-text{
height:150px;
}

/* SEARCH */

.search{
flex:1;
display:flex;
justify-content:center;
}

.search input{
width:60%;
padding:14px 25px;
border-radius:35px;
border:2px solid #222;
font-size:14px;
outline:none;
}

/* ICONS */

.icons{
display:flex;
gap:40px;
}

.icon-box{
display:flex;
flex-direction:column;
align-items:center;
font-size:14px;
cursor:pointer;
position:relative;
}

.icon-box svg{
width:36px;
height:36px;
margin-bottom:6px;
stroke:black;
stroke-width:2;
fill:none;
}

/* CART */

.cart-count{
position:absolute;
top:-5px;
right:-8px;
background:#f5a623;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
display:none;
}

/* NAV */

nav{
display:flex;
gap:40px;
padding:18px 60px;
background:#fff;
border-bottom:1px solid #eee;
position:sticky;
top:160px;
z-index:999;
}

nav a{
text-decoration:none;
color:#111;
font-size:18px;
}

nav a:hover{
color:#f5a623;
}

/* MAIN */

.main{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.main h1{
font-size:42px;
margin-bottom:20px;
}

.main p{
font-size:18px;
color:#666;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logotipo.png">
<img src="letras.png" class="logo-text">
</div>

<div class="search">
<input type="text" placeholder="O que é que procuras ?">
</div>

<div class="icons">

<div class="icon-box">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="7" r="4"/>
<path d="M5.5 21c1.5-4 11.5-4 13 0"/>
</svg>
<span>Conta</span>
</div>

<div class="icon-box" id="cartIcon">

<span class="cart-count" id="cartCount">0</span>

<svg viewBox="0 0 24 24">
<circle cx="9" cy="20" r="1.5"/>
<circle cx="17" cy="20" r="1.5"/>
<path d="M3 3h2l3 12h10l3-8H7"/>
</svg>

<span>Carrinho</span>

</div>

</div>

</header>

<nav>
<a href="index.html">Página Inicial</a>
<a href="sobrenos.html">Sobre Nós</a>
<a href="novidades.html">Novidades</a>
<a href="luvas.html">Luvas Guarda Redes</a>
<a href="training.html">Training</a>

<a href="promocoes.html">Promoções</a>
</nav>

<section class="main">

<h1>Promoções</h1>
<p>Ainda não disponível 🚧</p>

</section>

<footer>
© 2026 DP Gloves
</footer>

<script>

document.getElementById("cartIcon").addEventListener("click",function(){
window.location.href="carrinho.html";
});

function updateCartCount(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let count=0;

cart.forEach(item=>{
count+=item.quantity;
});

const badge=document.getElementById("cartCount");

if(count>0){
badge.style.display="block";
badge.textContent=count;
}

}

updateCartCount();

</script>

</body>
</html>
