
<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Criar Conta - DP Gloves</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#e5e5e5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTAINER */
.container{
width:90%;
max-width:1300px;
height:720px;
background:#fff;
border-radius:40px;
display:flex;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* LEFT */
.left{
width:40%;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
padding:60px;
}

.logo{
display:flex;
align-items:center;
gap:30px;
}

.logo img:first-child{
height:140px;
}

.logo img:last-child{
height:100px;
}

/* RIGHT */
.right{
width:60%;
padding:60px 80px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* TITLE */
.right h1{
font-size:50px;
font-weight:900;
margin-bottom:20px;
}

/* TEXT */
.subtitle{
font-size:18px;
color:#555;
margin-bottom:30px;
}

/* FORM */
.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.form-group input{
width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#eee;
font-size:16px;
}

/* BUTTON */
button{
margin-top:15px;
background:#333;
color:white;
border:none;
padding:15px 35px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#000;
}

/* LINK */
.login-link{
margin-top:15px;
font-size:14px;
color:#666;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<div class="logo">
<img src="logotipo.png">
<img src="letras.png">
</div>
</div>

<!-- RIGHT -->
<div class="right">

<h1>CRIA A TUA CONTA</h1>

<p class="subtitle">
Junta-te à DP Gloves e melhora o teu desempenho em campo ⚽
</p>

<div class="form-group">
<label>Nome</label>
<input type="text" id="nome" placeholder="Nome completo">
</div>

<div class="form-group">
<label>E-mail</label>
<input type="email" id="email" placeholder="e-mail">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="password">
</div>

<button onclick="register()">Criar Conta</button>

<div class="login-link" onclick="goLogin()">
Já tens conta? Inicia sessão
</div>

</div>

</div>

<script>

function register(){

let nome=document.getElementById("nome").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(nome==="" || email==="" || password===""){
alert("Preenche todos os campos");
return;
}

// Guardar utilizador
let user={
nome:nome,
email:email,
password:password
};

localStorage.setItem("user", JSON.stringify(user));

alert("Conta criada com sucesso!");

window.location.href="index.html";
}

function goLogin(){
window.location.href="login.html";
}

</script>

</body>
</html>
