
<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - DP Gloves</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#e5e5e5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTAINER */
.container{
width:90%;
max-width:1300px;
height:700px;
background:#fff;
border-radius:40px;
display:flex;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* LEFT SIDE */
.left{
width:40%;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
padding:60px;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:30px;
}

.logo img:first-child{
height:140px;
}

.logo img:last-child{
height:100px;
}

/* RIGHT SIDE */
.right{
width:60%;
padding:60px 80px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* TITLE */
.right h1{
font-size:52px;
font-weight:900;
margin-bottom:20px;
}

/* SUBTEXT */
.subtitle{
font-size:18px;
color:#555;
margin-bottom:40px;
max-width:500px;
}

/* SWITCH */
.switch{
display:flex;
gap:60px;
margin-bottom:30px;
font-weight:bold;
font-size:20px;
}

.switch span{
cursor:pointer;
transition:0.2s;
}

.switch span:hover{
color:#f5a623;
}

.switch .active{
border-bottom:3px solid #f5a623;
padding-bottom:5px;
}

/* FORM */
.form-group{
margin-bottom:25px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.form-group input{
width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#eee;
font-size:16px;
}

/* BUTTON */
.actions{
display:flex;
align-items:center;
gap:20px;
margin-top:10px;
}

button{
background:#333;
color:white;
border:none;
padding:15px 35px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#000;
}

.forgot{
color:#666;
font-size:14px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<div class="logo">
<img src="logotipo.png">
<img src="letras.png">
</div>
</div>

<!-- RIGHT -->
<div class="right">

<h1>INICIA SESSÃO OU<br>CRIA A TUA CONTA</h1>

<p class="subtitle">
A tua melhor versão começa aqui — agarra a oportunidade como as bolas de jogo
</p>

<div class="switch">
<span class="active">JÁ TENS CONTA?</span>
<span onclick="goRegister()">ÉS NOVO CLIENTE?</span>
</div>

<div class="form-group">
<label>E-mail</label>
<input type="email" placeholder="e-mail">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="password">
</div>

<div class="actions">
<button onclick="login()">Aceder</button>
<span class="forgot">Esqueceu-se da password</span>
</div>

</div>

</div>

<script>

function login(){
alert("Login sucedido");
window.location.href="index.html";
}

function goRegister(){
window.location.href="criar.html";
}

</script>

</body>
</html>
